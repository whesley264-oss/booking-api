spring:
  datasource:
    url: jdbc:h2:file:./data/bookingdb
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update

booking:
  business:
    hour-start: "09:00"
    hour-end: "20:00"
  booking:
    min-advance-hours: 2
    min-duration-minutes: 60
    max-duration-hours: 4
    allow-weekends: true
  cancellation:
    min-hours: 4

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    com.template.booking: INFO
    org.springframework.security: WARN